name: Build BabylonFX APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    # الضربة القاضية: استيراد ماكينة 8.4 جاهزة من الخارج وتجاهل ماكينة جيثب التجريبية
    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # بناء التطبيق بالماكينة المستوردة مباشرة بدون المرور بملف gradlew المضروب
    - name: Build APK directly
      run: gradle assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: BabylonFX-Scalper-APK
        path: app/build/outputs/apk/debug/app-debug.apk
