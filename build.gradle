buildscript {
    repositories {
        google()
        mavenCentral()
        // حل المشكلة: إضافة مستودع أداة بايثون الرسمي للأندرويد
        maven { url "https://chaquo.com/maven" }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
        classpath 'com.chaquo.python:gradle:15.0.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // إضافته هنا أيضاً لضمان قراءة الموديولات
        maven { url "https://chaquo.com/maven" }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
